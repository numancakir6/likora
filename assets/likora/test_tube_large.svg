<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 2160">
  <defs>
    <linearGradient id="glassStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6ECFF"/>
      <stop offset="100%" stop-color="#D4C2EA"/>
    </linearGradient>
    <linearGradient id="innerShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="bottomGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="0" dy="42" stdDeviation="35" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- outer glass -->
    <path d="M180 144
             C130 144 100 177 100 228
             C100 276 130 306 160 321
             L160 1680
             C160 1914 275 2016 375 2016
             C475 2016 590 1914 590 1680
             L590 321
             C620 306 650 276 650 228
             C650 177 620 144 570 144
             Z"
          fill="rgba(255,255,255,0.02)"
          stroke="url(#glassStroke)"
          stroke-width="22"
          stroke-linejoin="round"/>

    <!-- inner cavity hint -->
    <path d="M207 288
             L207 1668
             C207 1866 295 1956 375 1956
             C455 1956 542 1866 542 1668
             L542 288"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.08"
          stroke-width="7"
          stroke-linecap="round"/>

    <!-- left highlight -->
    <path d="M237 300 L237 1686 C237 1800 280 1884 330 1932"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.20"
          stroke-width="35"
          stroke-linecap="round"/>

    <!-- top glossy -->
    <rect x="245" y="150" width="160" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.55"/>
    <circle cx="195" cy="168" r="22" fill="#FFFFFF" fill-opacity="0.30"/>

    <!-- inner soft fill -->
    <path d="M190 264 L190 1674 C190 1890 295 1980 375 1980 C455 1980 560 1890 560 1674 L560 264 Z"
          fill="url(#innerShade)"/>

    <!-- bottom glow -->
    <ellipse cx="375" cy="1914" rx="135" ry="78" fill="url(#bottomGlow)"/>
  </g>
</svg>
