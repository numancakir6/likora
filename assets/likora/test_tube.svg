<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 520">
  <defs>
    <linearGradient id="glassStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6ECFF"/>
      <stop offset="100%" stop-color="#D4C2EA"/>
    </linearGradient>
    <linearGradient id="innerShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="bottomGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- outer glass -->
    <path d="M58 42
             C42 42 33 51 33 66
             C33 80 42 88 52 92
             L52 392
             C52 458 93 488 120 488
             C147 488 188 458 188 392
             L188 92
             C198 88 207 80 207 66
             C207 51 198 42 182 42
             Z"
          fill="rgba(255,255,255,0.02)"
          stroke="url(#glassStroke)"
          stroke-width="8"
          stroke-linejoin="round"/>

    <!-- inner cavity hint -->
    <path d="M67 81
             L67 388
             C67 441 100 468 120 468
             C140 468 173 441 173 388
             L173 81"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.08"
          stroke-width="3"
          stroke-linecap="round"/>

    <!-- left highlight -->
    <path d="M76 86 L76 394 C76 424 89 447 104 459"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.20"
          stroke-width="12"
          stroke-linecap="round"/>

    <!-- top glossy -->
    <rect x="78" y="44" width="50" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.55"/>
    <circle cx="62" cy="48" r="7" fill="#FFFFFF" fill-opacity="0.30"/>

    <!-- inner soft fill -->
    <path d="M61 73 L61 390 C61 449 97 477 120 477 C143 477 179 449 179 390 L179 73 Z"
          fill="url(#innerShade)"/>

    <!-- bottom glow -->
    <ellipse cx="120" cy="456" rx="43" ry="22" fill="url(#bottomGlow)"/>
  </g>
</svg>
