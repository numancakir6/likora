workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 26.0
      groups:
        - likora
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lexion.likora

    scripts:
      - name: Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Create App Store Connect key
        script: |
          printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/appstore_key.p8
          echo "----- debug first lines -----"
          head -n 2 /tmp/appstore_key.p8
          echo "----- debug last line -----"
          tail -n 1 /tmp/appstore_key.p8

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --archive-directory build/ios/archive \
            --ipa-directory build/ios/ipa

      - name: Publish to App Store Connect
        script: |
          app-store-connect publish \
            --path /Users/builder/clone/build/ios/ipa/likora.ipa \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/appstore_key.p8 \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log