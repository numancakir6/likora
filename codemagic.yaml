workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 26.0
      groups:
        - likora
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lexion.likora

    scripts:
      - name: Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Create App Store Connect key
        script: |
          echo "$APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY_BASE64" | base64 --decode > /tmp/appstore_key.p8 || echo "$APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY_BASE64" | base64 -d > /tmp/appstore_key.p8

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --archive-directory build/ios/archive \
            --ipa-directory build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: /tmp/appstore_key.p8
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true