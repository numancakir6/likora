workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 26.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lexion.likora

    scripts:
      - name: Flutter packages
        script: |
          flutter pub get

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true