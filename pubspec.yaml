name: likora
description: Likora App

publish_to: 'none'

version: 1.0.2+5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.0.10
  shared_preferences: ^2.5.3

  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  audioplayers: ^6.0.0
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/likora/
    - assets/lexion/
    - assets/sfx/click.mp3
    - assets/sfx/complete.mp3
    - assets/sfx/small.mp3
    - assets/sfx/water.mp3
    - assets/sfx/music_1.mp3
    - assets/sfx/music_2.mp3
    - assets/sfx/music_3.mp3
    - assets/sfx/music_4.mp3
    - assets/sfx/music_5.mp3
    - assets/sfx/music_6.mp3
    - assets/sfx/music_7.mp3

flutter_launcher_icons:
  ios: true
  image_path: "assets/likora/likora_ikon.png"